<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>치카치카 친구들!</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c4dff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="치카치카">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:linear-gradient(160deg,#c8edff 0%,#ffe8f7 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.cloud{position:fixed;background:rgba(255,255,255,0.7);border-radius:50px;pointer-events:none;animation:cloudMove linear infinite;}
@keyframes cloudMove{from{transform:translateX(-220px)}to{transform:translateX(110vw)}}

/* ── 온보딩 ── */
#onboardScreen{background:white;border-radius:36px;padding:32px 24px 36px;width:420px;box-shadow:0 24px 60px rgba(100,80,180,0.16);position:relative;z-index:10;text-align:center;}
.ob-emoji{font-size:4rem;margin-bottom:12px;animation:obBounce 1.5s ease-in-out infinite;}
@keyframes obBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ob-title{font-size:1.7rem;color:#5533aa;margin-bottom:6px;}
.ob-sub{font-size:0.9rem;color:#a090cc;margin-bottom:28px;line-height:1.5;}
.ob-label{font-size:1rem;color:#5533aa;margin-bottom:10px;text-align:left;}
.ob-input{width:100%;padding:16px 18px;border:2.5px solid #d0c0f8;border-radius:18px;font-family:'Jua',sans-serif;font-size:1.3rem;color:#3d2b8e;outline:none;transition:border-color 0.2s;text-align:center;}
.ob-input:focus{border-color:#7c4dff;}
.ob-input::placeholder{color:#c8b8f0;font-size:1.1rem;}
.ob-btn{width:100%;padding:16px;border:none;border-radius:20px;font-family:'Jua',sans-serif;font-size:1.2rem;cursor:pointer;color:white;margin-top:16px;background:linear-gradient(135deg,#b39ddb,#7c4dff);box-shadow:0 6px 20px rgba(124,77,255,0.3);transition:transform 0.13s,opacity 0.2s;}
.ob-btn:active{transform:scale(0.97);}
.ob-btn:disabled{opacity:0.35;cursor:default;}
.ob-hint{font-size:0.78rem;color:#c0b0e0;margin-top:10px;}

/* ── 선택 화면 ── */
#selectScreen{display:none;background:white;border-radius:36px;padding:24px 20px 28px;width:420px;box-shadow:0 24px 60px rgba(100,80,180,0.16);position:relative;z-index:10;text-align:center;}
#selectScreen h1{font-size:1.65rem;color:#5533aa;margin-bottom:3px;}
#selectScreen .sub{font-size:0.85rem;color:#a090cc;margin-bottom:18px;}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px;}
.char-card{border-radius:20px;padding:12px 4px 9px;cursor:pointer;border:3px solid transparent;background:#f5f0ff;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);position:relative;}
.char-card:hover{transform:scale(1.06);border-color:#b39ddb;}
.char-card.selected{border-color:#7c4dff;background:#ede7ff;transform:scale(1.08);box-shadow:0 6px 20px rgba(124,77,255,0.28);}
.char-card canvas{display:block;margin:0 auto 5px;}
.char-card .cname{font-size:0.78rem;color:#5533aa;}
.char-card .check{position:absolute;top:5px;right:7px;font-size:1rem;opacity:0;transition:opacity 0.2s;}
.char-card.selected .check{opacity:1;}
#selectBtn{width:100%;padding:15px;border:none;border-radius:20px;font-family:'Jua',sans-serif;font-size:1.15rem;cursor:pointer;color:white;background:linear-gradient(135deg,#b39ddb,#7c4dff);box-shadow:0 6px 20px rgba(124,77,255,0.3);transition:transform 0.13s;margin-top:4px;}
#selectBtn:active{transform:scale(0.97);}
#selectBtn:disabled{opacity:0.38;cursor:default;}

/* ── 메인 카드 ── */
#mainScreen{display:none;}
.card{background:white;border-radius:36px;padding:16px 18px 22px;width:420px;box-shadow:0 24px 60px rgba(13,111,163,0.15);position:relative;z-index:10;text-align:center;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.back-btn{background:none;border:2px solid #ddd;border-radius:11px;padding:4px 9px;font-family:'Jua',sans-serif;font-size:0.75rem;color:#999;cursor:pointer;}
.vol-wrap{display:flex;align-items:center;gap:6px;background:#f0ecff;border-radius:20px;padding:5px 10px;}
.vol-icon{font-size:1rem;cursor:pointer;user-select:none;}
.vol-slider{-webkit-appearance:none;appearance:none;width:80px;height:5px;border-radius:3px;background:linear-gradient(to right,#7c4dff 0%,#7c4dff 30%,#d0c8f0 30%,#d0c8f0 100%);outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#7c4dff;box-shadow:0 2px 6px rgba(124,77,255,0.35);cursor:pointer;}

/* 씬 */
.scene-wrap{position:relative;width:100%;height:210px;border-radius:20px;overflow:hidden;margin-bottom:11px;}
.road{position:absolute;bottom:0;left:0;right:0;height:28px;}
.road-line{position:absolute;bottom:10px;height:4px;background:#FFE066;border-radius:3px;animation:roadAnim 0.45s linear infinite;animation-play-state:paused;}
@keyframes roadAnim{from{transform:translateX(0)}to{transform:translateX(-60px)}}
.bubble{position:absolute;top:6px;left:50%;transform:translateX(-50%) translateY(8px);background:white;border:2.5px solid #7c4dff;border-radius:15px;padding:5px 11px;font-size:0.8rem;color:#4a2d99;white-space:pre-line;text-align:center;line-height:1.3;max-width:72%;opacity:0;transition:opacity 0.35s,transform 0.35s;pointer-events:none;max-width:210px;}
.bubble::after{content:'';position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#7c4dff;}
.bubble.show{opacity:1;transform:translateX(-50%) translateY(0);}
#mainCanvas{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);}
.foam{position:absolute;border-radius:50%;background:rgba(255,255,255,0.88);pointer-events:none;animation:foamFloat 1s ease-out forwards;}
@keyframes foamFloat{0%{opacity:0.9;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.12)}}

/* 단계 */
.steps-wrap{margin-bottom:8px;}
.steps-row{display:flex;gap:3px;margin-bottom:3px;}
.step-pill{flex:1;padding:5px 1px;border-radius:9px;background:#f0f0ff;font-size:0.55rem;color:#9090cc;text-align:center;transition:all 0.3s;line-height:1.2;}
.step-pill .si{font-size:0.85rem;display:block;margin-bottom:1px;}
.step-pill.done{background:#d4f5e2;color:#27ae60;}
.step-pill.active{background:#7c4dff;color:white;transform:scale(1.06);box-shadow:0 3px 9px rgba(124,77,255,0.32);}

/* 링 */
.ring-wrap{position:relative;width:120px;height:120px;margin:0 auto 9px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{stroke:#ece8ff;}
.ring-fill{stroke:#7c4dff;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.5s;}
.ring-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.85rem;}
.ring-sub{display:none;}

/* 별 */
.stars{display:flex;justify-content:center;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.star{font-size:19px;opacity:0.15;transition:all 0.4s;transform:scale(0.7);}
.star.lit{opacity:1;transform:scale(1.18);animation:starPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes starPop{0%{transform:scale(0.4) rotate(-30deg)}60%{transform:scale(1.5) rotate(10deg)}100%{transform:scale(1.18)}}

/* 버튼 */
.btn{width:100%;padding:13px;border:none;border-radius:17px;font-family:'Jua',sans-serif;font-size:1.1rem;cursor:pointer;transition:transform 0.13s;}
.btn:active{transform:scale(0.96);}
.btn-start{color:white;box-shadow:0 5px 16px rgba(124,77,255,0.3);}
.btn-pause{background:linear-gradient(135deg,#FFB347,#FF8C42);color:white;}
.btn-reset{background:#ffe066;color:#4a3800;margin-top:6px;font-size:0.85rem;}
.sticker-btn{width:100%;padding:9px;border:2px solid #c5b0f0;border-radius:17px;background:white;font-family:'Jua',sans-serif;font-size:0.88rem;color:#5533aa;cursor:pointer;margin-top:6px;}
.parent-btn{width:100%;padding:8px;border:1.5px dashed #d0c8f0;border-radius:15px;background:transparent;font-family:'Jua',sans-serif;font-size:0.78rem;color:#b0a0d8;cursor:pointer;margin-top:5px;}
.done-banner{display:none;border-radius:13px;padding:9px;margin-bottom:9px;font-size:1.05rem;color:#4a3800;animation:bumpIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes bumpIn{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
#toast{position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:#5533aa;color:white;padding:14px 24px;border-radius:16px;font-family:'Jua',sans-serif;
  font-size:0.95rem;z-index:9999;opacity:0;transition:all 0.35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 30px rgba(85,51,170,0.4);max-width:85vw;text-align:center;white-space:pre-line;line-height:1.4;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.tts-indicator{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:white;border-radius:20px;padding:8px 16px;font-size:0.78rem;opacity:0;transition:opacity 0.3s;z-index:500;pointer-events:none;}
.tts-indicator.show{opacity:1;}

/* 모달 공통 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:26px;padding:18px 15px 22px;width:370px;max-height:82vh;overflow-y:auto;position:relative;transform:scale(0.85);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);}
.modal-overlay.open .modal{transform:scale(1);}
.modal h2{font-size:1.3rem;margin-bottom:2px;}
.modal .msub{font-size:0.76rem;color:#bbb;margin-bottom:12px;}
.modal-close{position:absolute;top:11px;right:14px;font-size:1.35rem;background:none;border:none;cursor:pointer;color:#ccc;}

/* 스티커 앨범 */
.album-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.sticker-slot{aspect-ratio:1;border-radius:11px;background:#f8f0ff;border:2px dashed #d4b8ff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.55rem;transition:transform 0.3s;}
.sticker-slot.earned{border:2px solid #4CD964;background:linear-gradient(135deg,#efffef,#d4f5e2);transform:scale(1.04);}
.sticker-slot.locked{filter:grayscale(1);opacity:0.28;}
.sticker-slot .sn{font-size:0.5rem;color:#27ae60;margin-top:1px;}
.sticker-slot.new-earn{animation:stickerPop 0.6s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes stickerPop{0%{transform:scale(0.2) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1.04)}}
.prog-wrap{background:#eee;border-radius:8px;height:7px;margin-bottom:12px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;transition:width 0.8s ease;}

/* 대시보드 */
.dash-stat{flex:1;background:#f5f0ff;border-radius:14px;padding:10px 4px;text-align:center;}
.ds-num{font-size:1.5rem;color:#5533aa;}
.ds-label{font-size:0.62rem;color:#9090cc;margin-top:1px;}
.dash-section{font-size:0.85rem;color:#5533aa;margin-bottom:8px;border-left:3px solid #b39ddb;padding-left:8px;}
/* 대시보드 탭 */
.dash-tabs{display:flex;gap:6px;margin-bottom:16px;background:#f0ecff;border-radius:14px;padding:5px;}
.dash-tab{flex:1;padding:10px 4px;border:none;border-radius:10px;background:transparent;
  font-family:'Jua',sans-serif;font-size:0.85rem;color:#9090cc;cursor:pointer;transition:all 0.2s;}
.dash-tab.active{background:white;color:#5533aa;box-shadow:0 2px 8px rgba(124,77,255,0.15);}
.dash-pane{display:none;}
.dash-pane.active{display:block;animation:fadeInPane 0.3s ease;}
@keyframes fadeInPane{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.time-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;}
.time-bar{width:100%;border-radius:8px 8px 0 0;min-height:8px;}
.time-label{font-size:0.62rem;color:#888;text-align:center;line-height:1.4;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-head{font-size:0.6rem;color:#aaa;text-align:center;padding:2px 0;}
.cal-day{aspect-ratio:1;border-radius:8px;background:#f8f8f8;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.65rem;color:#888;}
.cal-day.done{background:linear-gradient(135deg,#e8fff3,#c8f5d8);color:#27ae60;font-weight:bold;}
.cal-day.today{outline:2px solid #7c4dff;outline-offset:1px;}
.cal-day.empty{background:transparent;}
.dash-btn{width:100%;padding:10px;border:none;border-radius:14px;font-family:'Jua',sans-serif;font-size:0.92rem;cursor:pointer;margin-bottom:8px;background:#f0ecff;color:#5533aa;}
.dash-btn-danger{background:#fff0f0;color:#c62828;}
.step-setting-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#f8f5ff;border-radius:12px;padding:8px 12px;transition:all 0.2s;user-select:none;}
.step-setting-row.dragging{opacity:0.4;transform:scale(0.97);}
.step-setting-row.drag-over{border:2px solid #7c4dff;background:#ede7ff;transform:scale(1.02);}
.drag-handle{font-size:1.1rem;cursor:grab;color:#b0a0d8;flex-shrink:0;padding:0 2px;touch-action:none;}
.drag-handle:active{cursor:grabbing;}

/* ── 캐릭터 성장 배지 ── */
.growth-badge{position:absolute;top:4px;right:6px;background:linear-gradient(135deg,#FFD600,#FF8C00);color:white;border-radius:20px;padding:3px 8px;font-size:0.65rem;font-weight:bold;box-shadow:0 2px 8px rgba(255,140,0,0.4);z-index:6;}
.level-up-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.level-up-overlay.show{opacity:1;pointer-events:all;}
.level-up-card{background:white;border-radius:28px;padding:28px 24px;text-align:center;width:300px;animation:levelUpPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes levelUpPop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.level-up-emoji{font-size:4rem;margin-bottom:8px;}
.level-up-title{font-size:1.5rem;color:#5533aa;margin-bottom:4px;}
.level-up-sub{font-size:0.9rem;color:#a090cc;margin-bottom:16px;}
.level-up-btn{width:100%;padding:12px;border:none;border-radius:16px;background:linear-gradient(135deg,#b39ddb,#7c4dff);color:white;font-family:'Jua',sans-serif;font-size:1rem;cursor:pointer;}
/* 액세서리 (캔버스 위에 절대 위치) */
.accessory-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
/* 알림 설정 */
.notif-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#f8f5ff;border-radius:12px;padding:10px 14px;}
.notif-toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.notif-toggle input{opacity:0;width:0;height:0;}
.notif-slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:0.3s;}
.notif-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;}
.notif-toggle input:checked+.notif-slider{background:#7c4dff;}
.notif-toggle input:checked+.notif-slider:before{transform:translateX(20px);}
.time-input{border:1.5px solid #d0c8f0;border-radius:8px;padding:4px 8px;font-family:'Jua',sans-serif;font-size:0.88rem;color:#3d2b8e;outline:none;}

/* ── PIN 입력 모달 ── */
#pinOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#pinOverlay.open{opacity:1;pointer-events:all;}
#pinModal{background:white;border-radius:24px;padding:24px 20px 20px;width:280px;text-align:center;
  transform:scale(0.85);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);}
#pinOverlay.open #pinModal{transform:scale(1);}
.pin-title{font-size:1.2rem;color:#3d2b8e;margin-bottom:4px;}
.pin-sub{font-size:0.78rem;color:#aaa;margin-bottom:16px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#e0d8ff;transition:background 0.2s;}
.pin-dot.filled{background:#7c4dff;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.pin-key{padding:14px;border:none;border-radius:14px;background:#f5f0ff;
  font-family:'Jua',sans-serif;font-size:1.2rem;color:#3d2b8e;cursor:pointer;transition:all 0.15s;}
.pin-key:active{background:#7c4dff;color:white;transform:scale(0.95);}
.pin-key.del{background:#fff0f0;color:#e53935;}
@keyframes pinShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.pin-cancel{width:100%;padding:10px;border:1.5px solid #e0d8ff;border-radius:14px;
  background:white;font-family:'Jua',sans-serif;font-size:0.9rem;color:#aaa;cursor:pointer;}
/* 확인 모달 */
#confirmOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:450;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#confirmOverlay.open{opacity:1;pointer-events:all;}
#confirmModal{background:white;border-radius:24px;padding:24px 22px 20px;width:300px;text-align:center;
  transform:scale(0.85);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);}
#confirmOverlay.open #confirmModal{transform:scale(1);}
.confirm-emoji{font-size:2.6rem;margin-bottom:8px;}
.confirm-msg{font-size:1rem;color:#3d2b8e;margin-bottom:6px;line-height:1.4;}
.confirm-sub{font-size:0.78rem;color:#aaa;margin-bottom:18px;}
.confirm-btns{display:flex;gap:8px;}
.confirm-yes{flex:1;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,#FF8C42,#FF6B6B);
  color:white;font-family:'Jua',sans-serif;font-size:0.95rem;cursor:pointer;}
.confirm-no{flex:1;padding:12px;border:1.5px solid #e0d8ff;border-radius:14px;background:white;
  color:#7c4dff;font-family:'Jua',sans-serif;font-size:0.95rem;cursor:pointer;}

/* PWA 설치 배너 *//* PWA 설치 배너 */
#installBanner{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:white;border-radius:20px;padding:14px 18px;box-shadow:0 8px 30px rgba(124,77,255,0.25);border:2px solid #ede7ff;flex-direction:row;align-items:center;gap:12px;z-index:1000;width:380px;max-width:95vw;}
.ib-icon{font-size:2rem;flex-shrink:0;}
.ib-text{flex:1;}
.ib-title{font-size:0.92rem;color:#3d2b8e;margin-bottom:2px;}
.ib-sub{font-size:0.72rem;color:#9090cc;}
.ib-actions{display:flex;gap:6px;margin-top:8px;}
.ib-install{padding:6px 14px;border:none;border-radius:12px;background:#7c4dff;color:white;font-family:'Jua',sans-serif;font-size:0.82rem;cursor:pointer;}
.ib-dismiss{padding:6px 10px;border:1.5px solid #d0c8f0;border-radius:12px;background:transparent;color:#9090cc;font-family:'Jua',sans-serif;font-size:0.78rem;cursor:pointer;}
</style>
</head>
<body>

<!-- 구름 -->
<script>
[{w:120,h:38,top:'7%',dur:18,del:0},{w:80,h:26,top:'20%',dur:14,del:6},{w:100,h:32,top:'4%',dur:22,del:11}].forEach(c=>{
  const el=document.createElement('div');el.className='cloud';
  el.style.cssText=`width:${c.w}px;height:${c.h}px;top:${c.top};left:-220px;animation-duration:${c.dur}s;animation-delay:${c.del}s`;
  document.body.appendChild(el);
});
</script>

<div id="toast"></div>
<div class="tts-indicator" id="ttsIndicator">🔊 말하는 중...</div>
<!-- PIN 입력 모달 -->

  'start_1': 'audio/start_1.mp3',
  'start_2': 'audio/start_2.mp3',
  'step0_1': 'audio/step0_1.mp3',
  'step0_2': 'audio/step0_2.mp3',

let _ttsAudioObj = null;

function playTTS(key, onEnd) {
  if(_ttsAudioObj){ _ttsAudioObj.pause(); _ttsAudioObj = null; }
  const data = TTS_AUDIO[key];
  if(!data){ if(onEnd)onEnd(); return; }
  _ttsAudioObj = new Audio(data);
  _ttsAudioObj.volume = 1.0;
  _ttsAudioObj.onended = ()=>{ _ttsAudioObj=null; if(onEnd)onEnd(); };
  _ttsAudioObj.onerror = ()=>{ _ttsAudioObj=null; if(onEnd)onEnd(); };
  _ttsAudioObj.play().catch(()=>{ if(onEnd)onEnd(); });
}

function stopTTS(){
  if(_ttsAudioObj){ _ttsAudioObj.pause(); _ttsAudioObj=null; }
}

// 이름 + TTS 재생 (이름은 Web Speech, 나머지는 mp3)
function speakWithName(ttsKey) {
  const name = getChildName();
  // 이름 호명 (Web Speech)
  if(name && name !== '친구') {
    const u = new SpeechSynthesisUtterance(name + '아,');
    u.lang='ko-KR'; u.rate=1.0; u.pitch=1.2; u.volume=1.0;
    if(_koVoice) u.voice=_koVoice;
    u.onend = ()=> playTTS(ttsKey);
    u.onerror = ()=> playTTS(ttsKey);
    speechSynthesis.cancel();
    setTimeout(()=>speechSynthesis.speak(u), 60);
  } else {
    playTTS(ttsKey);
  }
}

  try{ return JSON.parse(localStorage.getItem('chika_profiles'))||[]; }
  catch(e){ return []; }

function saveProfiles(p){ localStorage.setItem('chika_profiles',JSON.stringify(p)); }
function getActiveProfileIdx(){ return parseInt(localStorage.getItem('chika_active_profile')||'0'); }
function setActiveProfileIdx(i){ localStorage.setItem('chika_active_profile',String(i)); }
function getActiveProfile(){
  const profiles=loadProfiles();
  const idx=getActiveProfileIdx();
  return profiles[idx]||null;
}
function getChildName(){

  return p?p.name:'친구';
}
function setChildName(n){
  // 레거시 호환
  localStorage.setItem('chika_name',n.trim());
  // 프로필에도 반영
  const profiles=loadProfiles();
  const idx=getActiveProfileIdx();
  if(profiles[idx]) profiles[idx].name=n.trim();
  saveProfiles(profiles);
}
// 프로필별 데이터 키
function profileKey(key){ return `chika_p${getActiveProfileIdx()}_${key}`; }
function loadStepSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('chika_steps'));
    return (Array.isArray(s)&&s.length>0)?s:JSON.parse(JSON.stringify(DEFAULT_STEPS));
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STEPS)); }
}
function saveStepSettings(s){ localStorage.setItem('chika_steps',JSON.stringify(s)); }
function getActiveSteps(){ return loadStepSettings().filter(s=>s.enabled); }

// 출석
function getDateKey(d){ d=d||new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function loadAttendance(){
  const p=getActiveProfile();
  try{ return p?(p.attendance||{}):JSON.parse(localStorage.getItem('chika_attend')||'{}'); }
  catch(e){ return {}; }

function saveAttendance(d){
  const profiles=loadProfiles();
  const idx=getActiveProfileIdx();
  if(profiles[idx]){ profiles[idx].attendance=d; saveProfiles(profiles); }
  else localStorage.setItem('chika_attend',JSON.stringify(d));
}
function recordToday(slot){
  const d=loadAttendance(),k=getDateKey();
  if(!d[k])d[k]={morning:false,afternoon:false,evening:false,count:0};
  if(!d[k][slot]){d[k][slot]=true;d[k].count=(d[k].count||0)+1;}
  saveAttendance(d);
}
function getStreak(){
  const d=loadAttendance();let streak=0,dt=new Date();
  for(let i=0;i<365;i++){const k=getDateKey(dt);if(d[k]&&d[k].count>0)streak++;else if(i>0)break;dt.setDate(dt.getDate()-1);}
  return streak;
}
function getTotalDays(){ return Object.values(loadAttendance()).filter(v=>v.count>0).length; }

function getTimeSlot(){ const h=new Date().getHours(); return h>=5&&h<12?'morning':h>=12&&h<18?'afternoon':'evening'; }

// ════════════════════════════════════════
// 음악 - 3곡 선택 가능
// ════════════════════════════════════════
const MUSIC_TRACKS = [
  {id:'mountain', name:'🎵 Happy Kids', artist:'The Mountain', data:'audio/music_mountain.mp3'},
  {id:'hitslab',  name:'🎵 Kids Happy', artist:'HitsLab',      data:'audio/music_hitslab.mp3'},
  {id:'sigma',    name:'🎵 Kids Happy BG', artist:'SigmaMusicArt', data:'audio/music_sigma.mp3'},
];

let musicPlaying=false, _isMuted=false, _currentTrackId='mountain';
// Audio 엘리먼트를 곡마다 미리 생성 (재사용 → createMediaElementSource 문제 회피)
const _audioEls={};
// Web Audio API GainNode (곡당 1회만 연결)
let _audioCtx=null, _gainNode=null;
const _connectedEls=new WeakSet();

function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  return _audioCtx;
}
function getGainNode(){
  if(!_gainNode && getAudioCtx()){
    _gainNode=_audioCtx.createGain();
    _gainNode.gain.value=getVolume();
    _gainNode.connect(_audioCtx.destination);
  }
  return _gainNode;
}
function getAudioEl(trackId){
  if(!_audioEls[trackId]){
    const track=MUSIC_TRACKS.find(t=>t.id===trackId)||MUSIC_TRACKS[0];
    const a=new Audio(track.data);
    a.loop=true;
    a.volume=getVolume();
    _audioEls[trackId]=a;
  }
  return _audioEls[trackId];
}
function connectGain(audioEl){
  // 엘리먼트당 1회만 연결
  const ctx=getAudioCtx();
  if(!ctx || _connectedEls.has(audioEl)) return;
  try{
    const src=ctx.createMediaElementSource(audioEl);
    src.connect(getGainNode());
    _connectedEls.add(audioEl);
  }catch(e){ /* 이미 연결됨 */ }
}

function getVolume(){
  const s=document.getElementById('volSlider');
  return s?parseInt(s.value)/100:0.3;
}

function startMusic(){
  const audio=getAudioEl(_currentTrackId);
  const ctx=getAudioCtx();
  try{
    connectGain(audio);
    if(ctx && ctx.state==='suspended') ctx.resume();
  }catch(e){}
  // GainNode + audio.volume 둘 다 설정 (호환성)
  const vol=getVolume();
  if(_gainNode) _gainNode.gain.value=vol;
  audio.volume=vol;
  audio.play().catch(()=>{});
  musicPlaying=true; _isMuted=false;
  updateMusicIcon();
}

function stopMusic(){
  // 모든 오디오 정지
  Object.values(_audioEls).forEach(a=>{a.pause();a.currentTime=0;});
  musicPlaying=false; _isMuted=false;
  const vol=getVolume();
  if(_gainNode) _gainNode.gain.value=vol;
  updateMusicIcon();
}

function loadTrack(id){
  const wasPlaying=musicPlaying && !_isMuted;
  // 현재 곡 정지
  const cur=_audioEls[_currentTrackId];
  if(cur){cur.pause();cur.currentTime=0;}
  _currentTrackId=id;
  localStorage.setItem('chika_track',id);
  if(wasPlaying){
    startMusic();
  }
}

function toggleMusic(){
  if(_isMuted){
    // 언뮤트
    _isMuted=false;
    const vol=getVolume();
    if(_gainNode) _gainNode.gain.value=vol;
    const audio=getAudioEl(_currentTrackId);
    audio.volume=vol;
    if(audio.paused){
      connectGain(audio);
      const ctx=getAudioCtx();
      if(ctx&&ctx.state==='suspended') ctx.resume();
      audio.play().catch(()=>{});
    }
    musicPlaying=true;
    updateMusicIcon();
  } else if(musicPlaying){
    // 뮤트 (볼륨만 0, 재생 유지)
    _isMuted=true;
    if(_gainNode) _gainNode.gain.value=0;
    const audio=_audioEls[_currentTrackId];
    if(audio) audio.volume=0;
    musicPlaying=false;
    updateMusicIcon();
  } else {
    startMusic();
  }
}

function updateMusicIcon(){
  const btn=document.getElementById('musicBtn');
  if(!btn)return;
  const vol=getVolume();
  if(_isMuted||!musicPlaying){btn.textContent='🔇';return;}
  btn.textContent=vol===0?'🔇':vol<0.4?'🔉':'🎵';
}

function setVolume(v){
  const vol=parseInt(v)/100;
  if(!_isMuted){
    if(_gainNode) _gainNode.gain.value=vol;
    const audio=_audioEls[_currentTrackId];
    if(audio) audio.volume=vol;
  }
  const s=document.getElementById('volSlider');
  if(s) s.style.background=`linear-gradient(to right,#7c4dff 0%,#7c4dff ${v}%,#d0c8f0 ${v}%,#d0c8f0 100%)`;
  const btn=document.getElementById('musicBtn');
  if(btn){
    if(!musicPlaying||parseInt(v)===0) btn.textContent='🔇';
    else if(parseInt(v)<40) btn.textContent='🔉';
    else btn.textContent='🎵';
  }
}

function fadeOutMusic(ms){
  if(!musicPlaying)return;
  const audio=_audioEls[_currentTrackId];
  const startVol=getVolume();
  const steps=20, dt=ms/steps; let i=0;
  const iv=setInterval(()=>{
    i++;
    const v=Math.max(0,startVol*(1-i/steps));
    if(_gainNode) _gainNode.gain.value=v;
    if(audio) audio.volume=v;
    if(i>=steps){
      clearInterval(iv);
      stopMusic();
    }
  },dt);
}

// 한국어 호격조사 처리: 받침 있으면 '아', 없으면 '야'
function josaName(){
  const name=getChildName();
  if(!name||name==='친구') return name;
  const last=name.charCodeAt(name.length-1);
  // 한글 음절인지 확인 (가~힣)
  if(last>=0xAC00 && last<=0xD7A3){
    const jong=(last-0xAC00)%28; // 종성(받침) 인덱스
    return name + (jong!==0 ? '아' : '야');
  }
  // 한글 아니면 그냥 '야'
  return name + '야';
}
function wn(t){
  // {name}아, 패턴 → 받침 맞춰서 (이름+아/야)로
  let result = t.replace(/\{name\}아,/g, josaName()+',');
  result = result.replace(/\{name\}아/g, josaName());
  result = result.replace(/\{name\}/g, getChildName());
  return result;
}
function preprocess(t){ return t.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]/gu,'').replace(/아~/g,'아,').replace(/야~/g,'야,').replace(/~/g,',').trim(); };
function getTTSKey(text){
  // {name} 제거 후 매핑
  const clean = text.replace(/\{name\}아,\s*/g,'').replace(/\{name\}/g,'').trim();
  return TTS_KEY_MAP[clean] || null;
}

let _lastSpeakText='', _lastSpeakTime=0;
// 음성 재생 후 콜백 실행 (인사말 → 카운트 시작용)
function speakThen(raw, onDone){
  const text=preprocess(wn(raw));
  let done=false;
  const finish=()=>{ if(done)return; done=true; if(onDone)onDone(); };
  if(!window.speechSynthesis || !text){
    // TTS 없으면 글자수 기반 추정 시간 후 진행
    setTimeout(finish, Math.max(1500, text.length*120));
    return;
  }
  _lastSpeakText=text; _lastSpeakTime=Date.now();
  try{ speechSynthesis.cancel(); }catch(e){}
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.volume=1.0;
  u.rate=1.0; u.pitch=1.1;
  if(_koVoice)u.voice=_koVoice;
  u.onend=finish;
  u.onerror=finish;
  // 안전장치: 글자수 기반 예상시간 + 여유 (음성 콜백 안 와도 진행)
  const estMs = Math.max(2000, text.length*180 + 800);
  setTimeout(finish, estMs);
  setTimeout(()=>{
    try{
      if(speechSynthesis.speaking) speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch(e){ finish(); }
  },150);
}
function speak(raw){
  if(!window.speechSynthesis)return;
  const text = preprocess(wn(raw));
  if(!text)return;
  const now=Date.now();
  if(text===_lastSpeakText && now-_lastSpeakTime<1500) return;
  _lastSpeakText=text; _lastSpeakTime=now;
  // iOS Safari 안정화: cancel 후 충분히 지연
  try{ speechSynthesis.cancel(); }catch(e){}
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.volume=1.0;
  const sl=getTimeSlot();
  u.rate=sl==='morning'?1.0:sl==='evening'?0.92:1.0;
  u.pitch=sl==='morning'?1.15:sl==='evening'?1.05:1.1;
  if(_koVoice)u.voice=_koVoice;
  // cancel 직후 speak는 iOS에서 씹히므로 150ms 지연
  setTimeout(()=>{
    try{
      // 혹시 아직 말하는 중이면 한번 더 취소
      if(speechSynthesis.speaking) speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch(e){}
  },150);
}
function drainTTS(){
  if(!ttsQueue.length){ttsSpeaking=false;hideTTSInd();return;}
  ttsSpeaking=true; const text=preprocess(ttsQueue.shift()); if(!text){drainTTS();return;}
  showTTSInd(); speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='ko-KR'; u.volume=1;
  const sl=getTimeSlot(); u.rate=sl==='morning'?1.02:sl==='evening'?0.9:1.05; u.pitch=sl==='morning'?1.2:sl==='evening'?1.05:1.15;
  if(_koVoice)u.voice=_koVoice;
  u.onend=()=>{ttsSpeaking=false;hideTTSInd();setTimeout(drainTTS,80);};
  u.onerror=()=>{ttsSpeaking=false;hideTTSInd();setTimeout(drainTTS,80);};
  setTimeout(()=>{try{speechSynthesis.speak(u);}catch(e){ttsSpeaking=false;drainTTS();}},60);
}

const scriptCache={};
async function prefetchScript(idx, charName){
  const key=`${charName}_${idx}`;

    const data=await res.json();
    const txt=data.content?.[0]?.text?.trim();
    if(txt)scriptCache[key]=txt;
  }catch(e){}
}
function getScript(stepIdx,charName){
  const key=`${charName}_${stepIdx}`;
  const cached = scriptCache[key];
  let msg = cached || rand(SCRIPTS.steps[stepIdx]||SCRIPTS.steps[0]);

  if(Math.random() < 0.5){
    msg = '{name}아, ' + msg;
  }

}

// 🌟 히든 캐릭터 - 치카몬 (오리지널, 50회 달성시 해금)
function drawChikamon(c,t,mode,step,mini){
  const W=mini?145:240,H=mini?130:185;if(!mini)c.clearRect(0,0,W,H);
  const bounce=mode==='idle'?Math.sin(t*2.2)*3:mode==='done'?Math.sin(t*6)*7:Math.sin(t*7)*2.5;
  c.save();
  const scale=mini?1:0.92;
  c.translate(W/2,H*0.52+bounce);
  c.scale(scale,scale);

  // 몸통 (보라색 털뭉치)
  const bodyR=mini?38:46;
  // 털 질감 (외곽 삐죽삐죽)
  c.fillStyle='#9C7AE0';
  c.beginPath();
  const spikes=20;
  for(let i=0;i<spikes*2;i++){
    const a=(i*Math.PI/spikes)-Math.PI/2;
    const r=i%2===0?bodyR:bodyR-(mini?4:5);
    const x=Math.cos(a)*r, y=Math.sin(a)*r*1.05;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  }
  c.closePath();c.fill();

  // 몸통 안쪽 (밝은 보라)
  circ(c,0,2,bodyR-(mini?6:7),'#B39DDB');
  // 배 (연보라)
  c.fillStyle='#D1C4E9';
  c.beginPath();c.ellipse(0,mini?14:18,mini?20:25,mini?22:28,0,0,Math.PI*2);c.fill();

  // 팔 (만세 동작)
  c.strokeStyle='#9C7AE0';c.lineWidth=mini?8:10;c.lineCap='round';
  const armUp=mode==='done'?Math.sin(t*6)*0.3:0;
  c.beginPath();c.moveTo(-bodyR*0.7,0);c.lineTo(-bodyR*1.1,-bodyR*0.7-armUp*15);c.stroke();
  c.beginPath();c.moveTo(bodyR*0.7,0);c.lineTo(bodyR*1.1,-bodyR*0.7-armUp*15);c.stroke();
  // 손 (브이)
  circ(c,-bodyR*1.1,-bodyR*0.7-armUp*15,mini?6:7,'#B39DDB');
  circ(c,bodyR*1.1,-bodyR*0.7-armUp*15,mini?6:7,'#B39DDB');

  // 볼터치
  circ(c,-bodyR*0.55,-bodyR*0.05,mini?6:7,'rgba(255,150,180,0.5)');
  circ(c,bodyR*0.55,-bodyR*0.05,mini?6:7,'rgba(255,150,180,0.5)');

  // 입 (먼저 그려서 눈이 위에)
  const or=getOpenR(t,mode);
  drawMouth(c,0,mini?-2:-3,mini?26:30,mini?14:16,or,t,mode,step);

  // 눈
  drawEyes(c,0,mini?-20:-24,mode,step,t,mini?11:13,mini?6:7,mini?7:8,'#4A148C');

  // 별 배지 (가슴)
  if(!mini){
    c.save();c.translate(bodyR*0.5,bodyR*0.4);
    c.fillStyle='#FF8FAB';
    const sr=8,sr2=4;
    c.beginPath();
    for(let i=0;i<10;i++){const r=i%2===0?sr:sr2,a=(i*Math.PI/5)-Math.PI/2;
      const x=Math.cos(a)*r,y=Math.sin(a)*r;i===0?c.moveTo(x,y):c.lineTo(x,y);}
    c.closePath();c.fill();
    // 별 얼굴
    circ(c,-2,-1,1.2,'#4A148C');circ(c,2,-1,1.2,'#4A148C');
    c.strokeStyle='#4A148C';c.lineWidth=1;c.beginPath();c.arc(0,1,2,0.2,Math.PI-0.2);c.stroke();
    c.restore();
  }
  c.restore();
}

// 🌟 히든2 - 빛나리 (별 요정, 100회 해금)
function drawByulnari(c,t,mode,step,mini){
  const W=mini?145:240,H=mini?130:185;if(!mini)c.clearRect(0,0,W,H);
  const fl=Math.sin(t*2.2)*4;
  c.save();
  const scale=mini?1:0.92;
  c.translate(W/2,H*0.5+(mini?0:8)+fl);
  c.scale(scale,scale);

  // 반짝이는 후광
  c.save();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+t*0.8;
    const r=mini?42:50;
    c.globalAlpha=0.4+Math.sin(t*3+i)*0.3;
    c.fillStyle='#FFE082';
    const x=Math.cos(a)*r,y=Math.sin(a)*r;
    c.beginPath();
    for(let j=0;j<8;j++){const sa=j*Math.PI/4,sr=j%2===0?5:2;c.lineTo(x+Math.cos(sa)*sr,y+Math.sin(sa)*sr);}
    c.closePath();c.fill();
  }
  c.restore();

  // 별 몸통 (큰 별)
  const bodyR=mini?36:44;
  c.fillStyle='#FFD54F';
  c.beginPath();
  for(let i=0;i<10;i++){
    const a=(i*Math.PI/5)-Math.PI/2;
    const r=i%2===0?bodyR:bodyR*0.5;
    const x=Math.cos(a)*r,y=Math.sin(a)*r;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  }
  c.closePath();c.fill();
  // 안쪽 밝게
  c.fillStyle='#FFE082';
  c.beginPath();
  for(let i=0;i<10;i++){
    const a=(i*Math.PI/5)-Math.PI/2;
    const r=i%2===0?bodyR*0.7:bodyR*0.35;
    const x=Math.cos(a)*r,y=Math.sin(a)*r;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  }
  c.closePath();c.fill();

  // 볼터치
  circ(c,-13,2,mini?5:6,'rgba(255,140,100,0.5)');

  const or=getOpenR(t,mode);

}

// 🌟 히든3 - 무지개냥 (고양이, 150회 해금)
function drawRainbowcat(c,t,mode,step,mini){
  const W=mini?145:240,H=mini?130:185;if(!mini)c.clearRect(0,0,W,H);
  const bounce=mode==='idle'?Math.sin(t*2.3)*3:mode==='done'?Math.sin(t*6)*6:Math.sin(t*7)*2;
  c.save();
  const scale=mini?1:0.9;
  c.translate(W/2,H*0.52+bounce);
  c.scale(scale,scale);

  // 무지개 꼬리
  const rainbow=['#FF5252','#FF9800','#FFD600','#4CAF50','#2196F3','#9C27B0'];
  c.save();
  for(let i=0;i<rainbow.length;i++){
    c.strokeStyle=rainbow[i];
    c.lineWidth=3;
    c.globalAlpha=0.85;
    c.beginPath();
    const baseX=mini?32:40, off=i*4;
    for(let a=0;a<=20;a++){
      const tt=a/20;
      const x=baseX+Math.sin(tt*3+t*2)*8+tt*(mini?14:18);
      const y=tt*(mini?24:30)-off+(mini?4:6);
      a===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.stroke();
  }
  c.restore();

  // 몸통 (흰 고양이)
  const bodyR=mini?34:42;
  circ(c,0,mini?8:10,bodyR*0.85,'#F5F5F5');
  circ(c,0,mini?-8:-10,bodyR,'#FFFFFF');

  // 귀
  c.fillStyle='#FFFFFF';
  c.beginPath();c.moveTo(-bodyR*0.7,-bodyR*0.6);c.lineTo(-bodyR*0.5,-bodyR*1.15);c.lineTo(-bodyR*0.15,-bodyR*0.75);c.closePath();c.fill();
  c.beginPath();c.moveTo(bodyR*0.7,-bodyR*0.6);c.lineTo(bodyR*0.5,-bodyR*1.15);c.lineTo(bodyR*0.15,-bodyR*0.75);c.closePath();c.fill();
  // 귀 안쪽 핑크
  c.fillStyle='#FFB7C5';
  c.beginPath();c.moveTo(-bodyR*0.55,-bodyR*0.65);c.lineTo(-bodyR*0.45,-bodyR*1.0);c.lineTo(-bodyR*0.28,-bodyR*0.75);c.closePath();c.fill();
  c.beginPath();c.moveTo(bodyR*0.55,-bodyR*0.65);c.lineTo(bodyR*0.45,-bodyR*1.0);c.lineTo(bodyR*0.28,-bodyR*0.75);c.closePath();c.fill();

  // 볼터치
  circ(c,-bodyR*0.6,-bodyR*0.05,mini?5:6,'rgba(255,150,180,0.55)');
  circ(c,bodyR*0.6,-bodyR*0.05,mini?5:6,'rgba(255,150,180,0.55)');

  const or=getOpenR(t,mode);
  drawMouth(c,0,mini?-4:-5,mini?22:26,mini?12:14,or,t,mode,step);
  drawEyes(c,0,mini?-16:-19,mode,step,t,mini?10:12,mini?5:6,mini?6:7,'#5D4037');
  // 수염
  c.strokeStyle='#bbb';c.lineWidth=1.2;
  for(let s=-1;s<=1;s+=2){
    for(let i=0;i<3;i++){
      c.beginPath();
      c.moveTo(s*8,(mini?-3:-4)+i*3);
      c.lineTo(s*(mini?26:30),(mini?-6:-8)+i*5);
      c.stroke();
    }
  }
  // 코
  c.fillStyle='#FF8FAB';c.beginPath();c.moveTo(-2,mini?-7:-9);c.lineTo(2,mini?-7:-9);c.lineTo(0,mini?-4:-6);c.closePath();c.fill();
  c.restore();
}

// 선택 화면
// ════════════════════════════════════════
let selectedChar=null, selectedCardEl=null;

function renderProfileBar(){
  const bar=document.getElementById('profileBar');
  if(!bar) return;
  const profiles=loadProfiles();
  const activeIdx=getActiveProfileIdx();
  bar.innerHTML='';

  profiles.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.style.cssText=`padding:6px 14px;border-radius:20px;border:2.5px solid ${i===activeIdx?p.color:'#e0d8ff'};
      background:${i===activeIdx?p.color+'22':'white'};font-family:'Jua',sans-serif;font-size:0.85rem;
      color:${i===activeIdx?p.color:'#aaa'};cursor:pointer;transition:all 0.2s;`;
    btn.textContent=(i===activeIdx?'✅ ':'')+p.name;
    btn.onclick=()=>{
      setActiveProfileIdx(i);
      localStorage.setItem('chika_name',p.name);
      renderProfileBar();
      updateSelectGreeting();
      // 선택 초기화
      if(selectedCardEl){selectedCardEl.classList.remove('selected');selectedCardEl=null;}
      selectedChar=null;
      document.getElementById('selectBtn').disabled=true;
    };
    bar.appendChild(btn);
  });

  // + 추가 버튼
  if(profiles.length<4){
    const addBtn=document.createElement('button');
    addBtn.style.cssText=`padding:6px 12px;border-radius:20px;border:2px dashed #c5b0f0;
      background:white;font-family:'Jua',sans-serif;font-size:0.82rem;color:#b39ddb;cursor:pointer;`;
    addBtn.textContent='+ 추가';
    addBtn.onclick=addProfile;
    bar.appendChild(addBtn);
  }
}

function addProfile(){
  const profiles=loadProfiles();
  let name=prompt('아이 이름을 입력해주세요:');
  if(!name||!name.trim()) return;
  name=name.trim();
  // 중복 이름 체크
  if(profiles.some(p=>p.name===name)){
    toast(`"${name}"는 이미 있어요!\n다른 이름이나 별명을 써주세요.\n예) ${name}(첫째), ${name}동생`);
    return;
  }
  const colors=['#7c4dff','#FF6EB4','#1A9ADB','#4CD964','#FFD600','#FF8C42'];
  profiles.push({name,color:colors[profiles.length%colors.length],stickerCount:0,totalCount:0,attendance:{}});
  saveProfiles(profiles);
  setActiveProfileIdx(profiles.length-1);
  localStorage.setItem('chika_name',name);
  renderProfileBar();
  updateSelectGreeting();
  if(selectedCardEl){selectedCardEl.classList.remove('selected');selectedCardEl=null;}
  selectedChar=null;
  document.getElementById('selectBtn').disabled=true;
}

function buildSelectScreen(){
  const grid=document.getElementById('charGrid');
  grid.innerHTML='';
  const profile=getActiveProfile();
  const lastCharId=profile?.lastChar||null;
  const totalCount=getTotalCount();

  CHARS.forEach(ch=>{
    const locked = ch.hidden && totalCount < ch.unlockAt;
    const card=document.createElement('div');
    card.className='char-card';

    if(locked){
      // 잠긴 히든 캐릭터 - 물음표 + 잠금
      card.innerHTML=`<canvas width="90" height="78"></canvas>
        <div class="cname">???</div>
        <div style="position:absolute;inset:0;background:rgba(80,60,120,0.82);border-radius:17px;

    }

    card.innerHTML=`<canvas width="90" height="78"></canvas><div class="cname">${ch.name}</div><span class="check">✅</span>`;
    if(ch.hidden){
      // 해금된 히든 캐릭터 표시
      const badge=document.createElement('div');

      card.appendChild(badge);
    }
    const cv=card.querySelector('canvas');
    const c2=cv.getContext('2d');
    c2.save();c2.scale(0.62,0.62);
    try{ ch.draw(c2,0,'idle',0,true); }catch(e){ console.error(ch.name,e); }
    c2.restore();
    card.onclick=()=>{
      if(selectedCardEl)selectedCardEl.classList.remove('selected');

    if(ch.id===lastCharId){
      selectedChar=ch; selectedCardEl=card; card.classList.add('selected');
      document.getElementById('selectBtn').disabled=false;
    }
  });
}

const CIRC=314.2;
let STEP_META=[], TOTAL=160, STEP_COUNT=8;
let remaining=160, timerIv=null, running=false, currentStep=-1;
let animRaf=null, animT=0, animMode='idle', animStepIdx=0, foamIv=null;
const canvas=document.getElementById('mainCanvas');
const ctx2=canvas.getContext('2d');

function applyStepSettings(){
  STEP_META=getActiveSteps();
  STEP_COUNT=STEP_META.length;
  TOTAL=STEP_META.reduce((s,m)=>s+m.sec,0);
  renderStepPills();
  renderStars();
}
function renderStepPills(){
  const r1=document.getElementById('stepRow1'),r2=document.getElementById('stepRow2');
  if(!r1||!r2)return;
  r1.innerHTML='';r2.innerHTML='';
  STEP_META.forEach((s,i)=>{
    const p=document.createElement('div');p.className='step-pill';p.id='sp'+i;
    p.innerHTML=`<span class="si">${s.icon}</span><span style='font-size:0.5rem;line-height:1.2;'>${s.label}</span>`;
    (i<Math.ceil(STEP_META.length/2)?r1:r2).appendChild(p);
  });
}
function renderStars(){
  const w=document.getElementById('starWrap');if(!w)return;
  w.innerHTML='';
  STEP_META.forEach((_,i)=>{const s=document.createElement('span');s.className='star';s.id='st'+i;s.textContent='⭐';w.appendChild(s);});
}

function initMain(){
  applyStepSettings();
  remaining=TOTAL; currentStep=-1; running=false;
  const ch=selectedChar;
  document.getElementById('scene').style.background=`linear-gradient(180deg,${ch.bgGrad[0]} 55%,${ch.bgGrad[1]} 100%)`;
  document.getElementById('road').style.background=ch.roadColor;
  document.getElementById('btnStart').style.background=ch.btnGrad;
  document.getElementById('ringFill').style.stroke=ch.color1;
  document.getElementById('charTitle').textContent=`${ch.emoji} ${ch.name}`;
  document.getElementById('doneBanner').style.display='none';
  document.getElementById('btnStart').style.display='block';
  document.getElementById('btnStart').textContent='🪥 치카치카 시작!';
  document.getElementById('btnPause').style.display='none';
  document.getElementById('btnReset').style.display='none';
  const bcc=document.getElementById('btnChangeChar');if(bcc)bcc.style.display='none';
  document.getElementById('ringSub').textContent='준비됐나요?';
  document.getElementById('bubble').classList.remove('show');
  for(let i=0;i<STEP_COUNT;i++){const p=document.getElementById('sp'+i);if(p)p.classList.remove('active','done');const st=document.getElementById('st'+i);if(st)st.classList.remove('lit');}
  updateTimer(); updateRing();
  startRenderLoop('idle');
  updateGrowthBadge();
  // 슬라이더 초기화 + GainNode 볼륨 적용
  const sv3=document.getElementById('volSlider');
  if(sv3) setVolume(sv3.value);
  else if(_gainNode) _gainNode.gain.value=0.3;
  const theme=getTimeTheme();
  document.getElementById('mainCard').style.background=theme.sky?'white':'white';
  // 첫 prefetch
  prefetchScript(0, ch.name);

function startRenderLoop(mode,step){
  if(animRaf){cancelAnimationFrame(animRaf);animRaf=null;}
  clearInterval(foamIv);
  animMode=mode; animStepIdx=step||0;
  function loop(){animT+=0.038; try{selectedChar.draw(ctx2,animT,animMode,animStepIdx,false);}catch(e){} animRaf=requestAnimationFrame(loop);}
  loop();
  if(mode==='brushing') foamIv=setInterval(spawnFoam,380);
}
function spawnFoam(){
  const scene=document.getElementById('scene'),cv=document.getElementById('mainCanvas');
  const sr=scene.getBoundingClientRect(),cr=cv.getBoundingClientRect();
  for(let i=0;i<3;i++){
    const f=document.createElement('div');f.className='foam';
    const sz=5+Math.random()*9,tx=(Math.random()-0.5)*55+'px',ty=-(16+Math.random()*26)+'px';
    f.style.cssText=`width:${sz}px;height:${sz}px;left:${cr.left-sr.left+50+Math.random()*80}px;bottom:${sr.bottom-cr.bottom+38+Math.random()*20}px;--tx:${tx};--ty:${ty};`;
    scene.appendChild(f);setTimeout(()=>f.remove(),1000);
  }
}

function showBubble(text){
  const b=document.getElementById('bubble');
  b.textContent=wn(text);b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
}
function updateRing(){
  const pct=remaining/TOTAL;
  const fill=document.getElementById('ringFill');if(!fill)return;
  fill.style.strokeDashoffset=CIRC*(1-pct);
  const base=(selectedChar&&selectedChar.color1)||'#7c4dff';
  fill.style.stroke=pct>0.6?base:pct>0.3?'#FFB347':'#FF5252';
}
function updateTimer(){
  const m=Math.floor(remaining/60),s=remaining%60;
  const el=document.getElementById('timer');if(el)el.textContent=`${m}:${String(s).padStart(2,'0')}`;
}
function getStepIdx(elapsed){
  let acc=0;
  for(let i=0;i<STEP_META.length;i++){acc+=STEP_META[i].sec;if(elapsed<acc)return i;}
  return STEP_META.length-1;
}
function updateStep(){
  const elapsed=TOTAL-remaining;
  const idx=getStepIdx(elapsed);
  if(idx!==currentStep){
    currentStep=idx;
    for(let i=0;i<STEP_COUNT;i++){const p=document.getElementById('sp'+i);if(p){p.classList.remove('active','done');if(i<idx)p.classList.add('done');if(i===idx)p.classList.add('active');}}
    document.getElementById('ringSub').textContent=STEP_META[idx].label;
    const animS=STEP_META[idx].animStep; // 단계 고유 번호 (순서 바뀌어도 멘트 일치)
    const script=getScript(animS, selectedChar.name);
    showBubble(script);speak(script);
    startRenderLoop('brushing',animS);
    const st=document.getElementById('st'+idx);if(st)st.classList.add('lit');
    if(idx+1<STEP_COUNT){const nextAnim=STEP_META[idx+1].animStep;prefetchScript(nextAnim,selectedChar.name);}
  }
}
function animRoad(on){document.querySelectorAll('.road-line').forEach(l=>l.style.animationPlayState=on?'running':'paused');}

let _wakeLock=null, _pauseWakeTimer=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock=await navigator.wakeLock.request('screen');
      console.log('[WakeLock] 화면 켜짐 유지');
    }
  }catch(e){ console.log('[WakeLock] 지원 안됨:', e.message); }
}
function releaseWakeLock(){
  if(_wakeLock){_wakeLock.release();_wakeLock=null;console.log('[WakeLock] 해제');}
}

let _inSession=false;     // 양치 세션 진행 중 플래그
let _pendingStart=null;   // 인사말 후 시작 콜백 (취소용)
let _inGreeting=false;    // 인사말 재생 중 플래그
let _pausedDuringGreeting=false; // 인사말 중 일시정지 눌림
function startTimer(){
  if(running)return;
  _inSession=true;
  _pausedDuringGreeting=false; // 재시작 시 리셋
  if(!musicPlaying)startMusic();
  requestWakeLock();
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnPause').style.display='block';

  if(currentStep>=0 && remaining!==TOTAL){
    // 일시정지 후 재개 - 바로 카운트
    clearTimeout(_pauseWakeTimer);
    requestWakeLock(); // 화면 다시 켜둠
    running=true; animRoad(true);
    startRenderLoop('brushing',STEP_META[currentStep].animStep);
    beginCountdown();
  } else {
    // 처음 시작 - 인사말 먼저, 끝나면 카운트 시작
    currentStep=-1;
    remaining=TOTAL;
    updateTimer();
    _inGreeting=true;  // 인사말 단계 진입
    const greeting=rand(SCRIPTS.start);
    showBubble(greeting);
    _pendingStart=()=>{
      _inGreeting=false;
      if(!_inSession) return;       // 세션 종료됐으면 시작 안 함
      if(_pausedDuringGreeting){ _pausedDuringGreeting=false; return; } // 인사말 중 정지했으면 시작 안 함
      running=true; animRoad(true);
      updateStep();
      beginCountdown();
    };
    speakThen(greeting, ()=>{ if(_pendingStart) _pendingStart(); });
  }
}
function beginCountdown(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    remaining--;updateTimer();updateRing();updateStep();
    if(remaining<=0){clearInterval(timerIv);running=false;finishTimer();}
  },1000);
}
function pauseTimer(){
  // 인사말 재생 중에 누르면: 인사말 취소하고 처음 상태로
  if(_inGreeting){
    _pausedDuringGreeting=true;
    _inGreeting=false;
    stopTTS();
    speechSynthesis.cancel();
    running=false;
    document.getElementById('btnPause').style.display='none';
    document.getElementById('btnStart').style.display='block';
    document.getElementById('btnStart').textContent='▶️ 시작!';
    showBubble('준비되면 시작 버튼을 눌러줘!');
    return;
  }
  clearInterval(timerIv);running=false;animRoad(false);clearInterval(foamIv);
  stopTTS();
  startRenderLoop('idle');
  document.getElementById('btnPause').style.display='none';
  document.getElementById('btnStart').style.display='block';
  document.getElementById('btnStart').textContent='▶️ 계속!';
  const s=rand(SCRIPTS.pause);showBubble(s);speak(s);
  // 5분간 방치되면 배터리 위해 화면 잠금 허용
  clearTimeout(_pauseWakeTimer);
  _pauseWakeTimer=setTimeout(()=>{ if(!running) releaseWakeLock(); }, 5*60*1000);
}
function finishTimer(){
  _inSession=false; _pendingStart=null;
  clearInterval(foamIv);animRoad(false);startRenderLoop('done');
  releaseWakeLock();
  document.getElementById('btnPause').style.display='none';
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnReset').style.display='block';
  document.getElementById('btnChangeChar').style.display='block';
  const doneMsg=rand(SCRIPTS.done);
  const banner=document.getElementById('doneBanner');banner.textContent='🎉 '+wn(doneMsg);banner.style.display='block';
  document.getElementById('ringSub').textContent='완료! 🎉';
  showBubble('야호! 완료! 🎉');speak(doneMsg);
  for(let i=0;i<STEP_COUNT;i++)setTimeout(()=>{const st=document.getElementById('st'+i);if(st)st.classList.add('lit');},i*90);
  for(let i=0;i<STEP_COUNT;i++){const p=document.getElementById('sp'+i);if(p){p.classList.remove('active');p.classList.add('done');}}
  for(let i=0;i<32;i++)setTimeout(confetti,i*55);
  fadeOutMusic(4000);
  recordToday(getTimeSlot());
  // 총 횟수 증가 + 레벨업 체크
  const prevTotal = getTotalCount();
  setTotalCount(prevTotal + 1);
  const newTotal = prevTotal + 1;
  checkLevelUp(prevTotal);
  updateGrowthBadge();
  // 히든 캐릭터 해금 체크
  CHARS.forEach(ch=>{
    if(ch.hidden && prevTotal < ch.unlockAt && newTotal >= ch.unlockAt){
      setTimeout(()=>{
        document.getElementById('luEmoji').textContent=ch.emoji;
        document.getElementById('luTitle').textContent='🎉 히든 캐릭터 해금!';
        document.getElementById('luSub').textContent=`'${ch.name}'을(를) 만났어요! 이제 같이 놀 수 있어요!`;
        document.getElementById('levelUpOverlay').classList.add('show');
        for(let i=0;i<40;i++)setTimeout(confetti,i*55);
      }, 3500);
    }
  });
  awardSticker();
}
function resetTimer(){
  _inSession=false;_pendingStart=null;
  remaining=TOTAL;currentStep=-1;clearInterval(timerIv);running=false;clearInterval(foamIv);animRoad(false);
  updateTimer();updateRing();startRenderLoop('idle');
  document.getElementById('btnStart').style.display='block';document.getElementById('btnStart').textContent='🪥 치카치카 시작!';
  document.getElementById('btnPause').style.display='none';document.getElementById('btnReset').style.display='none';
  document.getElementById('doneBanner').style.display='none';document.getElementById('ringSub').textContent='준비됐나요?';
  document.getElementById('bubble').classList.remove('show');
  for(let i=0;i<STEP_COUNT;i++){const st=document.getElementById('st'+i);if(st)st.classList.remove('lit');const p=document.getElementById('sp'+i);if(p)p.classList.remove('active','done');}
}
function goBack(){
  // 양치 세션 중이면 확인 (인사말 단계 포함)
  if(_inSession){
    customConfirm('지금 그만두고 친구를 바꿀까요?', '지금까지 한 건 저장되지 않아요', '🤔', (yes)=>{

function doGoBack(){

  clearInterval(timerIv);running=false;clearInterval(foamIv);animRoad(false);

  document.getElementById('selectScreen').style.display='block';

  document.getElementById('selectBtn').disabled=true;

}

function openAlbum(){ renderAlbum(); document.getElementById('albumOverlay').classList.add('open'); }
function closeAlbum(){ document.getElementById('albumOverlay').classList.remove('open'); }
function renderAlbum(newIdx){
  const count=loadCount(),grid=document.getElementById('albumGrid');grid.innerHTML='';
  STICKERS.forEach((s,i)=>{
    const earned=i<count;
    const slot=document.createElement('div');
    slot.className='sticker-slot'+(earned?' earned':' locked')+(i===newIdx?' new-earn':'');
    slot.innerHTML=`<span>${earned?s.emoji:'❓'}</span>${earned?`<span class="sn">${s.name}</span>`:''}`;
    grid.appendChild(slot);
  });
  const ch=selectedChar||CHARS[0];
  document.getElementById('progFill').style.background=`linear-gradient(90deg,${ch.color1},#4CD964)`;
  document.getElementById('progFill').style.width=Math.min(loadCount()/STICKERS.length*100,100)+'%';
  const c2=loadCount();
  document.getElementById('albumMsg').textContent=c2===0?'첫 스티커를 모아봐요!':c2>=STICKERS.length?'🎁 30개 다 모았어요! 선물 받을 시간이에요!':c2+'개 모았어요! '+(STICKERS.length-c2)+'개 더 모으면 선물이 기다려요!';
}
function awardSticker(){
  const prev=loadCount();
  // 누적 카운트는 항상 +1 (대시보드용)
  saveTotalStickers(loadTotalStickers()+1);

  const delay = document.getElementById('levelUpOverlay').classList.contains('show') ? 3000 : 2200;

  if(prev+1 >= STICKERS.length){
    // 30개 다 채움! → 축하 후 앨범 초기화
    saveCount(STICKERS.length); // 잠깐 꽉 찬 상태로 표시
    setTimeout(()=>{
      openAlbum();renderAlbum(STICKERS.length-1);
      speak('우와! 스티커 30개를 다 모았어요! 선물을 받을 시간이에요!');
      // 3초 후 앨범 초기화
      setTimeout(()=>{
        saveCount(0);
        renderAlbum();
        toast('🎁 새 스티커판을 시작해요!');
      }, 3500);
    }, delay);
  } else {
    // 일반 스티커 획득
    const next=prev+1;
    saveCount(next);
    setTimeout(()=>{
      openAlbum();renderAlbum(next-1);
      speak('새 스티커! '+STICKERS[next-1].name+' 스티커를 받았어!');
    }, delay);
  }
}

const PARENT_PIN='1234';
let dashUnlocked=false;
let _pinBuffer='', _pinCallback=null;
let _pinMode='verify', _pinFirstEntry='';
let _confirmCallback=null;
function customConfirm(msg, sub, emoji, cb){
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmSub').textContent=sub||'';
  document.getElementById('confirmEmoji').textContent=emoji||'🤔';
  _confirmCallback=cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function confirmAnswer(yes){
  document.getElementById('confirmOverlay').classList.remove('open');
  const cb=_confirmCallback; _confirmCallback=null;
  if(cb) cb(yes);
}

function setPinTitle(title, sub){
  const m=document.getElementById('pinModal');
  m.querySelector('.pin-title').textContent=title;
  m.querySelector('.pin-sub').textContent=sub;
}

function pinInput(n){
  if(_pinBuffer.length>=4)return;
  _pinBuffer+=n;
  updatePinDots();
  if(_pinBuffer.length===4) setTimeout(processPinComplete,150);
}
function pinDelete(){ _pinBuffer=_pinBuffer.slice(0,-1); updatePinDots(); }
function pinClear(){ _pinBuffer=''; updatePinDots(); }
function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d) d.classList.toggle('filled',i<_pinBuffer.length);
  }
}
function pinShakeError(){
  const m=document.getElementById('pinModal');
  m.style.animation='pinShake 0.4s';
  setTimeout(()=>{m.style.animation='';_pinBuffer='';updatePinDots();},400);
}

function processPinComplete(){
  const stored=localStorage.getItem('chika_pin')||PARENT_PIN;
  if(_pinMode==='verify'){
    if(_pinBuffer===stored){
      closePinModal();
      dashUnlocked=true;
      clearTimeout(_dashLockTimer);
      const cb=_pinCallback;_pinCallback=null;
      if(cb)cb();
    } else { pinShakeError(); }
  } else if(_pinMode==='new1'){

// 드래그 상태
let _dragSrc=null;

function renderStepSettings(settings){
  const area=document.getElementById('stepSettingArea');
  if(!area)return;
  area.innerHTML='';
  settings.forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='step-setting-row';
    row.dataset.idx=i;
    row.innerHTML=`
      <div class="drag-handle" style="width:40px;height:42px;display:flex;align-items:center;justify-content:center;background:#ede7ff;border-radius:10px;font-size:1.3rem;color:#7c4dff;touch-action:none;cursor:grab;user-select:none;">☰</div>
      <input type="checkbox" class="sc-chk" ${s.enabled?'checked':''} style="width:18px;height:18px;accent-color:#7c4dff;cursor:pointer;">
      <span style="font-size:1.1rem;">${s.icon}</span>
      <span style="flex:1;font-size:0.85rem;color:#3d2b8e;">${s.label}</span>
      <input type="number" class="sc-sec" value="${s.sec}" min="5" max="60" step="5"
        style="width:48px;padding:4px;border:1.5px solid #d0c8f0;border-radius:8px;font-family:'Jua',sans-serif;font-size:0.82rem;text-align:center;">
      <span style="font-size:0.7rem;color:#aaa;">초</span>`;

    const handle=row.querySelector('.drag-handle');
    // 길게 눌러야 드래그 시작 (0.4초)
    let holdTimer=null, dragging=false, startY=0, clone=null, ready=false;

    handle.addEventListener('touchstart',e=>{
      ready=false;
      holdTimer=setTimeout(()=>{
        ready=true;
        // 진동 피드백
        if(navigator.vibrate) navigator.vibrate(40);
        startDrag(e.touches[0].clientY);
      },400);
    },{passive:true});

    handle.addEventListener('touchmove',e=>{
      if(!ready){ clearTimeout(holdTimer); return; }
      e.preventDefault();
      moveDrag(e.touches[0].clientY, e.touches[0].clientX);
    },{passive:false});

    handle.addEventListener('touchend',e=>{
      clearTimeout(holdTimer);
      if(dragging) endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      ready=false;
    });

    function startDrag(y){
      dragging=true; startY=y; _dragSrc=row;
      clone=row.cloneNode(true);
      const r=row.getBoundingClientRect();
      clone.style.cssText=`position:fixed;width:${row.offsetWidth}px;left:${r.left}px;top:${r.top}px;opacity:0.9;z-index:9999;pointer-events:none;border-radius:12px;box-shadow:0 8px 24px rgba(124,77,255,0.4);transform:scale(1.03);`;
      document.body.appendChild(clone);
      row.style.opacity='0.3';
    }
    function moveDrag(y,x){
      if(!clone)return;
      const r=row.getBoundingClientRect();
      clone.style.top=(r.top+(y-startY))+'px';
      document.querySelectorAll('.step-setting-row').forEach(rr=>rr.classList.remove('drag-over'));
      const el=document.elementFromPoint(x,y);
      const target=el&&el.closest('.step-setting-row');
      if(target&&target!==row) target.classList.add('drag-over');
    }
    function endDrag(x,y){
      if(clone){clone.remove();clone=null;}
      row.style.opacity='';
      dragging=false;
      const el=document.elementFromPoint(x,y);
      const target=el&&el.closest('.step-setting-row');
      document.querySelectorAll('.step-setting-row').forEach(rr=>rr.classList.remove('drag-over'));
      if(target&&target!==row){
        const rows=[...area.querySelectorAll('.step-setting-row')];
        const fromIdx=rows.indexOf(row),toIdx=rows.indexOf(target);
        if(fromIdx<toIdx)area.insertBefore(row,target.nextSibling);
        else area.insertBefore(row,target);
      }
    }

    // 데스크톱 마우스 드래그 (핸들에서만)
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      _dragSrc=row;
      row.draggable=true;
    });
    row.addEventListener('dragstart',e=>{if(_dragSrc===row){row.classList.add('dragging');e.dataTransfer.effectAllowed='move';}});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');row.draggable=false;document.querySelectorAll('.step-setting-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();if(row!==_dragSrc){document.querySelectorAll('.step-setting-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');}});
    row.addEventListener('drop',e=>{
      e.preventDefault();row.classList.remove('drag-over');
      if(!_dragSrc||_dragSrc===row)return;
      const rows=[...area.querySelectorAll('.step-setting-row')];
      const fromIdx=rows.indexOf(_dragSrc),toIdx=rows.indexOf(row);
      if(fromIdx<toIdx)area.insertBefore(_dragSrc,row.nextSibling);
      else area.insertBefore(_dragSrc,row);
    });

    area.appendChild(row);
  });
}
// 현재 화면 입력값을 settings 배열로 수집 (화면 순서 그대로)
function collectStepSettings(){
  const rows=[...document.querySelectorAll('#stepSettingArea .step-setting-row')];
  const base=loadStepSettings();
  return rows.map(row=>{
    const idx=parseInt(row.dataset.idx);
    const orig=base[idx]||{};
    const enabled=row.querySelector('.sc-chk').checked;
    const sec=parseInt(row.querySelector('.sc-sec').value)||20;
    return {label:orig.label, icon:orig.icon, animStep:orig.animStep, enabled, sec};
  });
}

function saveDashSettings(){
  const newSettings=collectStepSettings();
  if(!newSettings.length){toast('설정을 불러올 수 없어요.');return;}
  // sec 범위 보정
  newSettings.forEach(s=>{ s.sec=Math.max(5,Math.min(60,parseInt(s.sec)||20)); });
  if(!newSettings.some(s=>s.enabled)){toast('최소 1개 이상 선택해주세요!');return;}
  saveStepSettings(newSettings);
  toast('저장됐어요! ✅\n다음 치카치카부터 적용돼요.');
}

function getTotalCount(){
  const p=getActiveProfile();
  return p?(p.totalCount||0):parseInt(localStorage.getItem('chika_total')||'0');

  const profiles=loadProfiles();

  else localStorage.setItem('chika_total',n);

function getCurrentLevel(){
  const total = getTotalCount();
  let cur = LEVELS[0];
  for(const lv of LEVELS){ if(total >= lv.need) cur = lv; else break; }
  return cur;
}
function getNextLevel(){
  const cur = getCurrentLevel();
  return LEVELS.find(lv => lv.lv === cur.lv + 1) || null;
}

function checkLevelUp(prevTotal){
  const newTotal = getTotalCount();
  let prevLv = LEVELS[0];
  for(const lv of LEVELS){ if(prevTotal >= lv.need) prevLv = lv; else break; }
  const newLv = getCurrentLevel();
  if(newLv.lv > prevLv.lv){
    setTimeout(()=>showLevelUp(newLv), 2500);
  }
}

// 캐릭터 위에 액세서리 그리기
function drawAccessory(c, accessory, W, H, t, mini){
  if(!accessory || accessory==='none') return;
  c.save();
  const cx = W/2;
  const headY = mini ? 15 : 22; // 캐릭터 머리 위 위치

  switch(accessory){
    case 'ribbon':
      // 리본
      c.fillStyle='#FF6EB4';
      c.beginPath();c.moveTo(cx-12,headY-2);c.lineTo(cx-4,headY+4);c.lineTo(cx,headY);c.lineTo(cx-4,headY-6);c.closePath();c.fill();
      c.beginPath();c.moveTo(cx+12,headY-2);c.lineTo(cx+4,headY+4);c.lineTo(cx,headY);c.lineTo(cx+4,headY-6);c.closePath();c.fill();
      c.fillStyle='#FF85C2';c.beginPath();c.arc(cx,headY,4,0,Math.PI*2);c.fill();
      break;
    case 'medal':
      // 메달
      c.fillStyle='#FFD600';c.beginPath();c.arc(cx,headY+2,9,0,Math.PI*2);c.fill();
      c.fillStyle='#FF8C00';c.beginPath();c.arc(cx,headY+2,6,0,Math.PI*2);c.fill();
      c.fillStyle='white';c.font=`bold ${mini?7:8}px serif`;c.textAlign='center';
      c.fillText('🏅',cx,headY+6);
      break;
    case 'star':
      // 별 왕관
      const starPts=5, starR=mini?8:10, starR2=mini?4:5;
      c.fillStyle='#FFD600';c.beginPath();
      for(let i=0;i<starPts*2;i++){
        const r=i%2===0?starR:starR2, a=(i*Math.PI/starPts)-Math.PI/2;
        i===0?c.moveTo(cx+r*Math.cos(a),headY+r*Math.sin(a)):c.lineTo(cx+r*Math.cos(a),headY+r*Math.sin(a));
      }
      c.closePath();c.fill();
      break;
    case 'crown':
      // 황금 왕관
      c.fillStyle='#FFD600';
      c.beginPath();c.moveTo(cx-12,headY+4);c.lineTo(cx-12,headY-6);c.lineTo(cx-6,headY-1);
      c.lineTo(cx,headY-8);c.lineTo(cx+6,headY-1);c.lineTo(cx+12,headY-6);c.lineTo(cx+12,headY+4);c.closePath();c.fill();
      c.fillStyle='#FF3D00';c.beginPath();c.arc(cx,headY-8,3,0,Math.PI*2);c.fill();
      c.fillStyle='#FF3D00';c.beginPath();c.arc(cx-12,headY-6,2.5,0,Math.PI*2);c.fill();
      c.fillStyle='#FF3D00';c.beginPath();c.arc(cx+12,headY-6,2.5,0,Math.PI*2);c.fill();
      break;
    case 'cape':
      // 망토
      c.fillStyle='rgba(124,77,255,0.85)';
      c.beginPath();c.moveTo(cx-15,headY+8);c.quadraticCurveTo(cx-20,headY+30,cx-10,headY+40);
      c.lineTo(cx+10,headY+40);c.quadraticCurveTo(cx+20,headY+30,cx+15,headY+8);c.closePath();c.fill();
      c.fillStyle='#FFD600';c.beginPath();c.arc(cx,headY+10,3,0,Math.PI*2);c.fill();
      break;
    case 'halo':
      // 후광
      c.strokeStyle='#FFD600';c.lineWidth=3;c.globalAlpha=0.85;
      c.beginPath();c.ellipse(cx,headY-4,mini?11:14,mini?5:6,0,0,Math.PI*2);c.stroke();
      // 반짝임
      c.fillStyle='#FFD600';c.globalAlpha=0.7+Math.sin(t*3)*0.3;
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3+t*1.5;
        const r=mini?14:18;
        c.beginPath();c.arc(cx+Math.cos(a)*r,headY-4+Math.sin(a)*6,1.5,0,Math.PI*2);c.fill();
      }
      break;
  }
  c.restore();
}

// 각 캐릭터 draw 함수를 래핑해서 액세서리 추가
const _origDrawFns = {};
function wrapDrawWithAccessory(charId, origFn){
  return function(c,t,mode,step,mini){
    origFn(c,t,mode,step,mini);
    const accessory = getCurrentLevel().accessory;
    if(accessory && accessory!=='none'){
      const W=mini?145:240, H=mini?130:185;
      drawAccessory(c, accessory, W, H, t, mini);
    }
  };
}

// ════════════════════════════════════════
// 🔔 알림 시스템
// ════════════════════════════════════════
function loadNotifSettings(){
  try{ return JSON.parse(localStorage.getItem('chika_notif')) || {morningOn:false,morningTime:'08:00',eveningOn:false,eveningTime:'20:00'}; }
  catch(e){ return {morningOn:false,morningTime:'08:00',eveningOn:false,eveningTime:'20:00'}; }
}
function saveNotifSettings(s){ localStorage.setItem('chika_notif', JSON.stringify(s)); }

async function requestNotifPermission(){
  if(!('Notification' in window)){ toast('이 브라우저는 알림을 지원하지 않아요.'); return false; }
  if(Notification.permission === 'granted') return true;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function scheduleNotifications(settings){
  // Service Worker 기반 알림 예약
  if(!('serviceWorker' in navigator) || !('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;

  navigator.serviceWorker.ready.then(sw => {
    // 기존 알림 예약 저장
    localStorage.setItem('chika_notif', JSON.stringify(settings));
    // SW에 스케줄 전달
    sw.active?.postMessage({
      type: 'SCHEDULE_NOTIF',
      settings: settings,
      childName: getChildName(),
    });
  });
}

// 알림 렌더 (대시보드)
function renderNotifSettings(){
  const area = document.getElementById('notifArea');
  if(!area) return;
  const s = loadNotifSettings();
  const perm = 'Notification' in window ? Notification.permission : 'unavailable';

  area.innerHTML = `
    ${perm==='denied'?'<p style="font-size:0.78rem;color:#e53935;margin-bottom:8px;">⚠️ 알림이 차단되어 있어요. 브라우저 설정에서 허용해주세요.</p>':''}
    ${perm==='unavailable'?'<p style="font-size:0.78rem;color:#aaa;margin-bottom:8px;">이 브라우저는 알림을 지원하지 않아요.</p>':''}
    <div class="notif-row">
      <label class="notif-toggle"><input type="checkbox" id="notifMornOn" ${s.morningOn?'checked':''}><span class="notif-slider"></span></label>
      <span style="font-size:1rem;">🌅</span>
      <span style="flex:1;font-size:0.88rem;color:#3d2b8e;">아침 알림</span>
      <input type="time" id="notifMornTime" value="${s.morningTime}" class="time-input">
    </div>
    <div class="notif-row">
      <label class="notif-toggle"><input type="checkbox" id="notifEveOn" ${s.eveningOn?'checked':''}><span class="notif-slider"></span></label>
      <span style="font-size:1rem;">🌙</span>
      <span style="flex:1;font-size:0.88rem;color:#3d2b8e;">저녁 알림</span>
      <input type="time" id="notifEveTime" value="${s.eveningTime}" class="time-input">
    </div>
    <button onclick="saveNotifSettings2()" class="dash-btn" style="background:#7c4dff;color:white;">🔔 알림 설정 저장</button>
  `;
}

async function saveNotifSettings2(){
  const granted = await requestNotifPermission();
  if(!granted){ toast('알림 권한이 필요해요! 브라우저에서 허용해주세요.'); return; }
  const s = {
    morningOn: document.getElementById('notifMornOn')?.checked||false,
    morningTime: document.getElementById('notifMornTime')?.value||'08:00',
    eveningOn: document.getElementById('notifEveOn')?.checked||false,
    eveningTime: document.getElementById('notifEveTime')?.value||'20:00',
  };
  saveNotifSettings(s);
  scheduleNotifications(s);
  toast('알림 설정이 저장됐어요! ✅\n설정한 시간에 알림이 와요.');
}

// 알림 체크 루프 (앱이 열려있을 때 - 백업용)
let _notifCheckIv = null;
function startNotifChecker(){
  if(_notifCheckIv) clearInterval(_notifCheckIv);
  _notifCheckIv = setInterval(()=>{
    const s = loadNotifSettings();
    if(!s.morningOn && !s.eveningOn) return;
    if(Notification.permission !== 'granted') return;
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const name = getChildName();
    if(s.morningOn && timeStr === s.morningTime){
      const key = `notif_sent_morning_${new Date().toDateString()}`;
      if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,'1');
        new Notification('🦷 치카치카 시간이에요!', {body:`${name}아, 아침 이 닦을 시간이야! 친구들이 기다리고 있어! 🚌`, icon:'icons/icon-192x192.png'});
      }
    }
    if(s.eveningOn && timeStr === s.eveningTime){
      const key = `notif_sent_evening_${new Date().toDateString()}`;
      if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,'1');
        new Notification('🦷 치카치카 시간이에요!', {body:`${name}아, 자기 전에 이 닦자! 충치 벌레 없애버려! 🌙`, icon:'icons/icon-192x192.png'});
      }
    }
  }, 30000); // 30초마다 체크
}

function initApp(){
  const savedTrack = localStorage.getItem('chika_track')||'mountain';
  _currentTrackId = savedTrack;
  const theme=getTimeTheme();
  document.body.style.background=theme.bg;
  CHARS.forEach(ch=>{ ch.draw = wrapDrawWithAccessory(ch.id, ch.draw); });
  startNotifChecker();

  // 기존 데이터 마이그레이션 (구버전 → 프로필 시스템)
  const savedName=localStorage.getItem('chika_name');
  const profiles=loadProfiles();
  if(savedName && profiles.length===0){
    // 기존 단일 사용자 데이터를 첫 프로필로 이전
    const migratedProfile={
      name:savedName, color:'#7c4dff',
      stickerCount:parseInt(localStorage.getItem('chika_count')||'0'),
      totalStickers:parseInt(localStorage.getItem('chika_count')||'0'),
      totalCount:parseInt(localStorage.getItem('chika_total')||'0'),
      attendance:JSON.parse(localStorage.getItem('chika_attend')||'{}'),
    };
    saveProfiles([migratedProfile]);
    setActiveProfileIdx(0);
  }

  if(savedName||profiles.length>0){
    document.getElementById('onboardScreen').style.display='none';
    document.getElementById('selectScreen').style.display='block';
    updateSelectGreeting();
    buildSelectScreen();
  }
}
initApp();
